name: Publish moma-domain wheel

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE: datagems-eosc/moma-domain

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # upload release asset
      packages: write   # push to GHCR

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" packages/moma-domain/pyproject.toml

      - name: Build moma-domain wheel
        run: uv build --package moma-domain --wheel --out-dir dist/

      - name: Install oras
        run: |
          curl -LO "https://github.com/oras-project/oras/releases/download/v1.2.3/oras_1.2.3_linux_amd64.tar.gz"
          tar -zxf oras_1.2.3_linux_amd64.tar.gz oras
          sudo mv oras /usr/local/bin/

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push wheel to GHCR
        run: |
          WHEEL=$(ls dist/moma_domain-*.whl)
          oras push \
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.ref_name }} \
            --artifact-type application/vnd.python.wheel \
            "${WHEEL}:application/vnd.python.wheel"
          oras tag \
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.ref_name }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest

      - name: Attach wheel to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/moma_domain-*.whl
