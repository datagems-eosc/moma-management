services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/python:3.14
    container_name: wp3_3_moma_management_devcontainer
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=momademo
    depends_on:
      neo4j:
        condition: service_healthy

  neo4j:
    image: neo4j:5.26
    container_name: wp3_3_moma_management_neo4j
    environment:
      - NEO4J_AUTH=neo4j/momademo
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
