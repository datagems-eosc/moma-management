Dataset:
  id: "@id"
  match: "@type == 'sc:Dataset'"
  labels: [ "sc:Dataset" ]

  map:
    type: "@type"
    name: name
    description: description
    datePublished: datePublished
    version: version
    license: license
    url: url
    inLanguage: inLanguage
    country: country
    citeAs: citeAs
    conformsTo: conformsTo
    headline: dg:headline
    keywords: dg:keywords
    fieldOfScience: dg:fieldOfScience
    status: dg:status
    access: dg:access
    doi: dg:doi
    uploadedBy: dg:uploadedBy
    archivedAt: sc:archivedAt

  children:
    distribution: Distribution
    recordSet: RecordSet

# All components of a Dataset, such as Files and Databases
Distribution:
  id: "@id"

  labels:

    # CSV
    - case: "encodingFormat == 'text/csv' && @type == 'cr:FileSet'"
      value: [ "CSVSet", "Data", "@type" ]
    - case: "encodingFormat == 'text/csv' && @type == 'cr:FileObject'"
      value: [ "CSV", "Data", "@type" ]
      # PDF
    - case: "encodingFormat == 'application/pdf' && @type == 'cr:FileSet'"
      value: [ "PDFSet", "Data", "@type" ]
    - case: "encodingFormat == 'application/pdf' && @type == 'cr:FileObject'"
      value: [ "PDF", "Data", "@type" ]
      # SQL
    - case: "encodingFormat == 'text/sql' && @type == 'cr:FileObject'"
      value: [ "Data", "Table", "@type" ]
    - case: "encodingFormat == 'text/sql'"
      value: [ "Data", "RelationalDatabase", "@type" ]
      # XML-like worksheets. We check if it's contained in something to determine if it's a sheet or a workbook.
      # We can't use the croissnat type to differentiate between sheets and workbooks because some datasets use FileObjects for both.
    - case: "encodingFormat ==
        'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' &&
        containedIn"
      value: [ "Data", "Sheet", "@type" ]
    - case: "encodingFormat ==
        'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'"
      value: [ "Data", "EXCEL", "@type" ]
      # Else. 
      # TODO: Might have to fail gracefully if we don't have a type or encodingFormat.
    - default: [ "Data", "@type" ]

  map:
    type: "@type"
    name: name
    description: description
    encodingFormat: encodingFormat
    contentUrl: contentUrl
    contentSize: contentSize
    sha256: sha256

  edges:
    - from: parent
      to: self
      label: distribution

    - from: self
      to: containedIn.@id
      label: containedIn

# The shape of the data contained in the files within the Distribution. 
# Each definition is a Field
RecordSet:
  id: "@id"
  match: "@type == 'cr:RecordSet'"

  # Default case 
  labels: [ "cr:RecordSet" ]
  map:
    name: name
    description: description
    examples: examples

  edges:
    - from: parent
      to: self
      label: recordSet

  children:
    field: Field

  variants:

    # A RecordSet whose source is a PDF has additional metadata
    - when: "_source.encodingFormat == 'application/pdf'"
      labels: [ "cr:RecordSet" ]
      map:
        name: name
        description: description
        examples: examples
        subject: subject
        author: author
        title: title
        producer: producer
        creator: creator
        creationDate: creationDate
        modificationDate: modificationDate
        pagesCount: pagesCount
        keywords: keywords
        summary: summary

    - when: "_source.encodingFormat == 'text/plain'"
      labels: [ "cr:RecordSet" ]
      map:
        name: name
        description: description
        examples: examples
        summary: summary
        keywords: keywords
        language: language
        numLines: numLines
        numWords: numWords
        numCharacters: numCharacters
        avgSentenceLength: avgSentenceLength
        numParagraphs: numParagraphs
        fleschKincaidGrade: fleschKincaidGrade

Field:
  id: "@id"
  match: "@type == 'cr:Field'"

  children:
    statistics: Statistics

  variants:

    # Column: source is a CSV, SQL table, or spreadsheet (FileObject with tabular encoding)
    - when: "_source.encodingFormat == 'text/csv' || _source.encodingFormat ==
        'text/sql' || _source.encodingFormat ==
        'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'"
      type: Column
      labels: [ "Column", "@type" ]
      map:
        name: name
        column: source.extract.column
        sample: sample

      edges:
        - from: parent
          to: self
          label: field

        - from: self
          to: source.fileObject.@id
          label: source/fileObject

# Statistics for a field. 
# This is a child of a Field, but it doesn't have to be because not all datasets have statistics. 
Statistics:
  id: "@id"
  labels: [ "Statistics", "@type" ]

  map:
    type: "@type"
    rowCount: "dg:rowCount"
    mean: "dg:mean"
    median: "dg:median"
    stddev: "dg:stddev"
    min: "dg:min"
    max: "dg:max"
    nullCount: "dg:nullCount"
    distinctCount: "dg:distinctCount"

  edges:
    - from: parent
      to: self
      label: statistics
